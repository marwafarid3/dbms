<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام إدارة العملاء</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    color: #fff;
}

.container {
    width: 90%;
    margin: auto;
}

h1 {
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
}

input {
    width: 23%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #00c9a7;
    color: white;
    cursor: pointer;
}

table {
    width: 100%;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 10px;
    text-align: center;
}

th {
    background: #6c5ce7;
    color: white;
}

.stats {
    display: flex;
    justify-content: space-around;
}

.stat-box {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 نظام إدارة العملاء</h1>

<div class="card">
<input id="name" placeholder="اسم العميل">
<input id="phone" placeholder="الموبايل">
<input id="email" placeholder="الإيميل">
<input id="notes" placeholder="ملاحظات">

<button onclick="addClient()">➕ إضافة</button>
</div>

<div class="card">
<input id="search" placeholder="بحث..." onkeyup="searchClient()">
</div>

<div class="card stats">
<div class="stat-box">
<h3 id="total">0</h3>
<p>عدد العملاء</p>
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>الاسم</th>
<th>الموبايل</th>
<th>الإيميل</th>
<th>ملاحظات</th>
<th>إجراءات</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>

// 🔥 حطي بيانات Firebase هنا
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ➕ إضافة
function addClient() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const email = document.getElementById("email").value;
    const notes = document.getElementById("notes").value;

    db.collection("clients").add({
        name, phone, email, notes
    });
}

// 📥 تحميل البيانات
db.collection("clients").onSnapshot(snapshot => {
    let table = document.getElementById("table");
    table.innerHTML = "";

    document.getElementById("total").innerText = snapshot.size;

    snapshot.forEach(doc => {
        let data = doc.data();

        table.innerHTML += `
        <tr>
        <td>${data.name}</td>
        <td>${data.phone}</td>
        <td>${data.email}</td>
        <td>${data.notes}</td>
        <td>
        <button onclick="deleteClient('${doc.id}')">🗑</button>
        </td>
        </tr>`;
    });
});

// 🗑 حذف
function deleteClient(id) {
    db.collection("clients").doc(id).delete();
}

// 🔍 بحث
function searchClient() {
    let input = document.getElementById("search").value.toLowerCase();
    let rows = document.querySelectorAll("tbody tr");

    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
    });
}

</script>

</body>
</html>
