<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>CRM Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:system-ui;margin:0}
.container{max-width:1200px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
.card{background:#111827;padding:15px;border-radius:15px}
input,textarea{width:100%;margin:5px 0;padding:10px;border-radius:10px;border:none}
button{padding:10px;border:none;border-radius:10px;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;margin-top:20px}
</style>
</head>

<body>

<div class="container">

<h1>📊 Dashboard</h1>

<div class="grid">
  <div class="card">👥 العملاء: <span id="total">0</span></div>
  <div class="card">📝 عندهم ملاحظات: <span id="notesCount">0</span></div>
</div>

<canvas id="chart" height="100"></canvas>

<hr>

<h2>إضافة عميل</h2>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="الموبايل">
<input id="email" placeholder="الإيميل">
<textarea id="notes" placeholder="ملاحظات"></textarea>
<button onclick="addClient()">حفظ</button>

<input id="search" placeholder="بحث..." oninput="render()">

<div class="cards" id="cards"></div>

</div>

<script>
const API = "/api/clients";
let editId = null;
let chart;

// إضافة / تعديل
async function addClient(){
  const name = nameEl.value;
  const phone = phoneEl.value;
  const email = emailEl.value;
  const notes = notesEl.value;

  if(!name || !phone || !email) return alert("املأ البيانات");

  if(editId){
    await fetch(API,{
      method:"PUT",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({id:editId,name,phone,email,notes})
    });
    editId=null;
  }else{
    await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name,phone,email,notes})
    });
  }

  clearForm();
  render();
}

// حذف
async function deleteClient(id){
  await fetch(API+"?id="+id,{method:"DELETE"});
  render();
}

// تعديل
function editClient(c){
  nameEl.value=c.name;
  phoneEl.value=c.phone;
  emailEl.value=c.email;
  notesEl.value=c.notes||"";
  editId=c._id;
}

// عرض
async function render(){
  const res = await fetch(API);
  const data = await res.json();

  const search = searchEl.value.toLowerCase();

  cards.innerHTML="";

  let notesCount=0;

  data.forEach(c=>{
    if(c.notes) notesCount++;

    if(
      c.name.toLowerCase().includes(search) ||
      c.phone.toLowerCase().includes(search) ||
      c.email.toLowerCase().includes(search)
    ){
      cards.innerHTML += `
      <div class="card">
        <h3>${c.name}</h3>
        <p>${c.phone}</p>
        <p>${c.email}</p>
        <p>${c.notes||"-"}</p>
        <button onclick='editClient(${JSON.stringify(c)})'>تعديل</button>
        <button onclick="deleteClient('${c._id}')">حذف</button>
      </div>`;
    }
  });

  total.innerText = data.length;
  notesCountEl.innerText = notesCount;

  drawChart(data);
}

// رسم
function drawChart(data){
  const days = {};
  data.forEach(()=> {
    const d = new Date().toLocaleDateString();
    days[d] = (days[d]||0)+1;
  });

  const labels = Object.keys(days);
  const values = Object.values(days);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{labels,datasets:[{label:"عدد العملاء",data:values}]}
  });
}

// عناصر
const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const emailEl = document.getElementById("email");
const notesEl = document.getElementById("notes");
const cards = document.getElementById("cards");
const searchEl = document.getElementById("search");
const total = document.getElementById("total");
const notesCountEl = document.getElementById("notesCount");

function clearForm(){
  nameEl.value="";
  phoneEl.value="";
  emailEl.value="";
  notesEl.value="";
}

render();
</script>

</body>
</html>
